<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger Mania | Acesso</title>
    <style>
        :root {
            --primary-color: #e67e22; /* Laranja/Dourado Burger */
            --secondary-color: #3d1d11; /* Marrom Grill */
            --bg-color: #f4f1ea;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: url('https://images.unsplash.com/photo-1550547660-d9450f859349?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            color: var(--secondary-color);
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 1rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: var(--secondary-color);
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--primary-color);
        }

        .toggle-link {
            margin-top: 1rem;
            display: block;
            color: var(--primary-color);
            text-decoration: none;
            font-size: 14px;
        }

        .toggle-link:hover {
            text-decoration: underline;
        }

        /* Lógica para alternar telas */
        #register-form { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-form">
        <h2>🍔 Login</h2>
        <form action="#">
            <div class="form-group">
                <label>Usuário</label>
                <input type="text" placeholder="Seu usuário" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" placeholder="Sua senha" required>
            </div>
            <button type="submit">ENTRAR NO CLUBE</button>
        </form>
        <a href="#" class="toggle-link" onclick="toggleForm('register')">Não tem conta? Cadastre-se aqui!</a>
    </div>

    <div id="register-form">
        <h2>🔥 Cadastro</h2>
        <form action="#">
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" placeholder="Como quer ser chamado?" required>
            </div>
            <div class="form-group">
                <label>Usuário</label>
                <input type="text" placeholder="Crie um usuário" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" placeholder="Crie uma senha forte" required>
            </div>
            <button type="submit">FINALIZAR CADASTRO</button>
        </form>
        <a href="#" class="toggle-link" onclick="toggleForm('login')">Já é de casa? Faça login!</a>
    </div>
</div>

<script>
    function toggleForm(type) {
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');

        if (type === 'register') {
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
        } else {
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
        }
    }
</script>

</body>
</html>
