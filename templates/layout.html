<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevBurger - Flex & Grid 2026</title> <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Oswald:wght@500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />

    <link rel="stylesheet" href="{{ url_for('static', filename='css/reset.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/variables.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/media.css') }}" />

    {% block css_adicional %}
    {% endblock %}
  </head>
  <body>

    <header class="header">
      <div class="header__container">
        <a href="/" class="header__logo">DevBurger</a>

        <nav class="header__nav">
          <ul class="header__menu">
            <li class="header__item">
              <a href="/" class="header__link">Home</a>
            </li>
            <li class="header__item">
              <a href="#menu" class="header__link">Cardápio</a>
            </li>
            <li class="header__item">
              <a href="#" class="header__link">Sobre</a>
            </li>
            <li class="header__item">
              <a href="#" class="header__link">Contato</a>
            </li>
          </ul>
        </nav>

        <div class="header__social">
          <a href="#" class="header__icon" title="Facebook">
            <span class="material-symbols-outlined">thumb_up</span>
          </a>
          <a href="#" class="header__icon" title="Instagram">
            <span class="material-symbols-outlined">photo_camera</span>
          </a>
        </div>

        <button class="header__toggle" aria-label="Abrir menu">
          <span class="material-symbols-outlined">menu</span>
        </button>
      </div>
    </header>
    
    <main> {% block conteudo %} {% endblock %}
    </main>

    <footer class="footer">
      <p class="footer__text">
        DevBurger © 2026. Todos os direitos reservados.
      </p>
    </footer>

    {# Espaço para scripts se precisar no futuro #}
    {% block scripts %}{% endblock %}
  </body>
</html>
