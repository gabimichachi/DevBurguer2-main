{% extends "layout.html" %}

{% block conteudo %}

<link rel="stylesheet" href="/templates/layout.html">

<style>
  .cart-sidebar {
    position: fixed;
    top: 0;
    right: -400px;
    width: 350px;
    height: 100vh;
    background: #fff8f3;
    box-shadow: -5px 0 20px rgba(0, 0, 0, 0.2);
    transition: 0.4s;
    z-index: 999;
    padding: 20px;
    overflow-y: auto;
  }

  .cart-sidebar.active {
    right: 0;
  }

  .cart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .cart-header h2 {
    color: #000000;
  }

  .close-cart {
    border: none;
    background: none;
    font-size: 28px;
    cursor: pointer;
  }

  .cart-items {
    margin-top: 20px;
  }

  .cart-item {
    background: white;
    border-radius: 12px;
    padding: 10px;
    margin-bottom: 15px;
  }

  .cart-item h4 {
    margin-bottom: 5px;
  }

  .cart-total {
    margin-top: 20px;
    font-size: 22px;
    font-weight: bold;
    color: #000000;
  }

  .icones-topo {
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .open-cart {
    background: #000000;
    color: white;
    border: none;
    padding: 15px 20px;
    border-radius: 50px;
    cursor: pointer;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .add-cart {
    background: #ffd54f;
    border: none;
    padding: 10px 15px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
  }

  .btn-finalizar {
    width: 100%;
    margin-top: 20px;
    padding: 15px;
    border: none;
    border-radius: 15px;
    background: #000000;
    color: white;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
  }

  .btn-finalizar:hover {
    transform: scale(1.03);
    background: #222;
  }
</style>



<button class="open-cart" onclick="abrirCarrinho()">
  🛒
</button>

<div class="cart-sidebar" id="carrinho">
  <div class="cart-header">
    <h2>Seu Carrinho</h2>
    <button class="close-cart" onclick="fecharCarrinho()">×</button>
  </div>

  <div class="cart-items" id="cart-items"></div>

  <div class="cart-total">
    Total: R$ <span id="total">0.00</span>
  </div>

  <button class="btn-finalizar" onclick="finalizarCompra()">
    Finalizar Compra
  </button>
</div>

<section class="banner">
  <div class="banner__content">
    <h1 class="banner__title">
      Code & <span class="banner__title--highlight">Flavor</span>
    </h1>
    <p class="banner__subtitle">
      O melhor hambúrguer da cidade compilado para você.
    </p>
  </div>
</section>

<section class="products" id="menu">
  <div class="products__container">

    <h2 class="products__title">Nosso Cardápio</h2>

    <div class="products__grid">

      {% for produto in produtos %}
      <article class="card">

        <div class="card__image-wrapper">
          <img src="{{ produto.foto }}" alt="{{ produto.produto }}" class="card__image" />
        </div>

        <div class="card__body">

          <h3 class="card__title">{{ produto.produto }}</h3>

          <p class="card__description">
            {{ produto.descricao }}
          </p>

          <div class="card__footer">
            <span class="card__price">
              R$ {{ produto.preco }}
            </span>

            <button class="add-cart" onclick="adicionarCarrinho(
                '{{ produto.produto }}',
                {{ produto.preco }}
              )">
              Comprar
            </button>

          </div>
        </div>
      </article>
      {% endfor %}

    </div>
  </div>
</section>

<script>
  let total = 0;

  function abrirCarrinho() {
    document.getElementById("carrinho").classList.add("active");

    const carrinhoAbrir = document.querySelector('.open-cart');
    carrinhoAbrir.style.display = 'none';
  }

  function fecharCarrinho() {
    document.getElementById("carrinho").classList.remove("active");

    const carrinhoAbrir = document.querySelector('.open-cart');
    carrinhoAbrir.style.display = '';
  }

  function adicionarCarrinho(nome, preco) {

    const cartItems = document.getElementById("cart-items");

    const item = document.createElement("div");
    item.classList.add("cart-item");

    item.innerHTML = `
      <h4>${nome}</h4>
      <p>R$ ${preco.toFixed(2)}</p>
    `;

    cartItems.appendChild(item);

    total += preco;

    document.getElementById("total").innerText =
      total.toFixed(2);

    abrirCarrinho();
  }

  function finalizarCompra() {

    if (total <= 0) {
      alert("Seu carrinho está vazio!");
      return;
    }

    alert("Compra finalizada com sucesso! 🛒");

    document.getElementById("cart-items").innerHTML = "";

    total = 0;

    document.getElementById("total").innerText = "0.00";

    fecharCarrinho();
  }
</script>

{% endblock %}
